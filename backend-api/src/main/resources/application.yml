spring:
  application:
    name: backend-api

  datasource:
    url: jdbc:postgresql://localhost:5432/sportsdb
    username: sportsuser
    password: sportspass

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  kafka:
    bootstrap-servers: localhost:29092
    consumer:
      group-id: sports-backend-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

server:
  port: 8080

app:
  kafka:
    topic:
      score-events: sports.score.events
  highlights:
    clips-dir: /Users/naitikshah/live-sport-intelligence/highlight-service/output/clips