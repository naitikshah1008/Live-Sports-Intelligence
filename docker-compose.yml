services:
  postgres:
    image: postgres:16
    container_name: sports-postgres
    environment:
      POSTGRES_DB: sportsdb
      POSTGRES_USER: sportsuser
      POSTGRES_PASSWORD: sportspass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sportsuser -d sportsdb"]
      interval: 10s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    container_name: sports-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: sports-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  backend-api:
    build:
      context: ./backend-api
      dockerfile: Dockerfile
    container_name: sports-backend-api
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sportsdb
      SPRING_DATASOURCE_USERNAME: sportsuser
      SPRING_DATASOURCE_PASSWORD: sportspass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      APP_HIGHLIGHTS_CLIPS_DIR: /shared-clips
    ports:
      - "8080:8080"
    volumes:
      - ./highlight-service/output/clips:/shared-clips
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sports-frontend
    depends_on:
      backend-api:
        condition: service_healthy
    ports:
      - "5173:80"

  prometheus:
    image: prom/prometheus:latest
    container_name: sports-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      backend-api:
        condition: service_healthy

  grafana:
    image: grafana/grafana:latest
    container_name: sports-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  pipeline-runner:
    build:
      context: .
      dockerfile: pipeline.Dockerfile
    container_name: sports-pipeline-runner
    depends_on:
      backend-api:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./sample-videos:/app/sample-videos
      - ./runs:/app/runs
      - ./training:/app/training
      - ./video-ingestion/templates:/app/video-ingestion/templates
      - ./video-ingestion/output:/app/video-ingestion/output
      - ./highlight-service/output:/app/highlight-service/output
    command: >
      sh -lc "
      python video-ingestion/main.py &&
      python highlight-service/main.py
      "
    restart: "no"

volumes:
  postgres_data:
  grafana_data: